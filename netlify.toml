[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 301

[[redirects]]
  from = "/discover"
  to = "/client/discover.html"
  status = 301

[[redirects]]
  from = "/saved"
  to = "/client/saved.html"
  status = 301

[[redirects]]
  from = "/api/create-checkout-session"
  to = "/.netlify/functions/create-checkout-session"
  status = 200

[[redirects]]
  from = "/api/create-billing-portal-session"
  to = "/.netlify/functions/create-billing-portal-session"
  status = 200

[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200
