<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting...</title>
</head>
<body>
  <script>
    (function redirectLegacySignupChoice() {
      const params = new URLSearchParams(window.location.search);
      const preferred = params.get("preferred");
      const next = new URL("auth-choice.html", window.location.href);
      next.searchParams.set("mode", "signup");
      if (preferred === "client" || preferred === "provider") {
        next.searchParams.set("preferred", preferred);
      }
      window.location.replace(next.toString());
    })();
  </script>
</body>
</html>
