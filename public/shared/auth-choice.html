<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="/favicon.ico" />
  <title>PlugFeed - Choose Role</title>
</head>
<body class="auth-page auth-choice-page" data-auth-flow="root">
  <main class="screen">
    <header class="topbar">
      <a class="brand-link" href="../landing.html" aria-label="PlugFeed home">
        <img src="/assets/plugFeedlogo-rmbg.png" alt="PlugFeed logo" class="brand-logo" />
      </a>
      <a class="ghost-button" href="../landing.html">Back</a>
    </header>

    <section class="panel auth-choice">
      <span class="kicker">plugFeed</span>
      <h1>Get Started</h1>
      <p class="muted">Choose account type, then continue.</p>
      <p class="muted" id="auth-choice-recent" hidden></p>

      <div class="auth-tabs" id="auth-choice-mode-tabs">
        <button class="tab active" data-mode="login" type="button">Log In</button>
        <button class="tab" data-mode="signup" type="button">Create Account</button>
      </div>

      <div class="choice-grid">
        <a class="choice-card" id="auth-choice-neighbor" data-role="client" href="login-client.html">
          <h3>I'm a Neighbor</h3>
          <p class="muted">Discover services and manage your requests.</p>
        </a>
        <a class="choice-card" id="auth-choice-plug" data-role="provider" href="login-provider.html">
          <h3>I'm a Plug</h3>
          <p class="muted">Manage business profile and proposals.</p>
        </a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase-config.js"></script>
  <script src="/js/guard.js"></script>
  <script src="/js/auth-flow-choice.js"></script>
  <script>
    redirectIfSignedIn();
  </script>
</body>
</html>
