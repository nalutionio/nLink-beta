<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="icon" href="../favicon.ico" />
  <title>plugFeed - Plug Community</title>
</head>
<body class="dashboard-page provider-theme">
  <main class="screen community-screen" id="community-root" data-role="provider" data-discovery-href="../provider/provider-jobs.html" data-jobs-href="../provider/provider-jobs.html">
    <header class="topbar compact-topbar">
      <a class="brand-link" href="../provider/provider-jobs.html" aria-label="PlugFeed home">
        <span class="brand-wordmark" aria-label="PlugFeed"><span class="plug">plug</span><span class="feed">Feed</span></span>
      </a>
      <p class="kicker topbar-kicker">Community</p>
      <div class="header-actions">
        <button class="ghost-button compact community-activity-btn" id="community-activity-btn" type="button" aria-label="Activity">
          <span class="material-symbols-rounded" aria-hidden="true">notifications</span>
          <span class="nav-badge hidden" id="community-activity-badge">0</span>
        </button>
      </div>
    </header>

    <div class="auth-status" id="community-status"></div>

    <section class="panel community-composer">
      <form id="community-post-form" class="modal-form community-composer-form">
        <div class="community-compose-head">
          <img id="community-composer-avatar" class="community-avatar" src="../assets/plugprofilepic.png" alt="Plug profile" />
          <textarea id="community-post-body" rows="3" placeholder="Share an update..." required></textarea>
        </div>
        <input type="hidden" id="community-post-type" value="showcase" />
        <div id="community-post-type-chips" class="community-type-chips"></div>
        <div class="grid-2">
          <label class="input-field">
            <span>Service Category (optional)</span>
            <select id="community-service-category">
              <option value="">Select category</option>
            </select>
          </label>
          <label class="input-field">
            <span>Service (optional)</span>
            <select id="community-service-name">
              <option value="">Select service</option>
            </select>
          </label>
        </div>
        <label class="input-field">
          <span>Tags (optional)</span>
          <select id="community-service-tags" multiple size="3"></select>
        </label>
        <div class="community-compose-actions">
          <button class="ghost-button compact community-quick-action" type="button" data-composer-action="photo" aria-label="Add photo">
            <span class="material-symbols-rounded" aria-hidden="true">image</span>
          </button>
          <button class="ghost-button compact community-quick-action" type="button" data-composer-action="tip" aria-label="Add tip">
            <span class="material-symbols-rounded" aria-hidden="true">lightbulb</span>
          </button>
          <button class="primary-button" type="submit">Post</button>
        </div>
      </form>
    </section>

    <section class="community-feed" id="community-feed"></section>
  </main>

  <nav class="bottom-nav">
    <a href="../provider/provider-jobs.html">Discover</a>
    <a href="../provider/provider-requests.html">Proposals</a>
    <a class="active" href="../provider/community.html">Community</a>
    <a href="../provider/provider-messages.html">Messages</a>
    <a href="../provider/profile.html">Profile</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/service-tags.js"></script>
  <script src="../js/nav-badges.js"></script>
  <script src="../js/community.js"></script>
  <script src="../js/auth-required.js"></script>
  <script>requireAuth();</script>
</body>
</html>
