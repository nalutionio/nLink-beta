<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="icon" href="../favicon.ico" />
  <title>plugFeed - Profile</title>
</head>
<body class="profile-page provider-theme">
  <main class="screen">
    <header class="topbar">
      <div class="topbar-title">
        <p class="kicker">Profile</p>
        <h1>Plug Account</h1>
      </div>
      <a class="icon-button" href="../provider/settings.html" aria-label="Open settings">⚙</a>
    </header>

    <section class="account-card">
      <div class="profile-avatar-lg">
        <img src="../assets/plugprofilepic.png" alt="Profile" id="provider-avatar" />
      </div>
      <div>
        <h2 id="provider-name">Your business</h2>
        <p class="muted" id="provider-email"></p>
      </div>
      <a class="primary-button" href="../provider/profile-edit.html">Edit Profile</a>
    </section>

    <section class="stat-grid">
      <article class="stat-card">
        <span class="stat-label">Profile Views</span>
        <h2 id="profile-stat-views">—</h2>
        <p class="stat-trend">Live data</p>
      </article>
      <article class="stat-card">
        <span class="stat-label">Saves</span>
        <h2 id="profile-stat-saves">—</h2>
        <p class="stat-trend">Live data</p>
      </article>
      <article class="stat-card">
        <span class="stat-label">Proposals</span>
        <h2 id="profile-stat-proposals">—</h2>
        <p class="stat-trend">Live data</p>
      </article>
      <article class="stat-card">
        <span class="stat-label">Messages</span>
        <h2 id="profile-stat-messages">—</h2>
        <p class="stat-trend">Live data</p>
      </article>
    </section>

    <section class="dashboard-panels">
      <article class="panel rating-panel">
        <div class="panel-header">
          <h3>Service Rating</h3>
          <span class="badge">Beta</span>
        </div>
        <div class="rating-score">
          <div>
            <h2 id="service-rating-value">Unrated</h2>
            <p class="muted" id="service-rating-count">No reviews yet</p>
          </div>
          <div class="rating-stars" id="service-rating-stars">☆☆☆☆☆</div>
        </div>
      </article>

      <article class="panel comments-panel">
        <div class="panel-header">
          <h3>Recent Comments</h3>
          <button class="ghost-button hidden" id="service-comments-more" type="button">See More</button>
        </div>
        <div id="service-comments-list">
          <p class="muted">No reviews yet.</p>
        </div>
      </article>

    </section>

    <div class="auth-status" id="profile-status"></div>
  </main>

  <nav class="bottom-nav">
    <a href="../provider/provider-jobs.html">Discover</a>
    <a href="../provider/provider-requests.html">Proposals</a>
    <a href="../provider/community.html">Community</a>
    <a href="../provider/provider-messages.html">Messages</a>
    <a class="active" href="../provider/profile.html">Profile</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/nav-badges.js"></script>
  <script src="../js/signout.js"></script>
  <script src="../js/auth-required.js"></script>
  <script>requireAuth();</script>
  <script src="../js/profile-provider.js"></script>
</body>
</html>
