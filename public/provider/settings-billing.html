<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="icon" href="../favicon.ico" />
  <title>PlugFeed - Billing</title>
</head>
<body class="settings-page provider-theme">
  <main class="screen">
    <header class="topbar">
      <a class="brand-link" href="../provider/provider-jobs.html" aria-label="PlugFeed dashboard">
        <span class="brand-empty" aria-hidden="true"></span>
      </a>
      <div class="topbar-title">
        <p class="kicker">Settings</p>
        <h1>Billing</h1>
      </div>
      <a class="ghost-button" href="../provider/profile.html">Back</a>
    </header>

    <section class="panel">
      <h3>Plan</h3>
      <p class="muted" id="billing-plan-copy">You are currently on the beta plan.</p>
      <button class="primary-button" id="billing-upgrade">Upgrade</button>
    </section>

    <section class="panel">
      <h3>Usage This Month</h3>
      <div class="settings-list">
        <div class="settings-item"><span>Proposal Responses</span><span class="pill" id="billing-proposals-used">0</span></div>
        <div class="settings-item"><span>Direct Requests Responded</span><span class="pill" id="billing-direct-used">0</span></div>
      </div>
    </section>

    <section class="panel">
      <h3>Payment Methods</h3>
      <div class="settings-list">
        <button class="settings-item" id="billing-add-card">Add payment method</button>
        <button class="settings-item" id="billing-history">Billing history</button>
      </div>
      <p class="muted" id="billing-status"></p>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="../provider/provider-jobs.html">Discover</a>
    <a href="../provider/provider-requests.html">Proposals</a>
    <a href="../provider/community.html">Community</a>
    <a href="../provider/provider-messages.html">Messages</a>
    <a class="active" href="../provider/profile.html">Profile</a>
  </nav>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/nav-badges.js"></script>
  <script src="../js/auth-required.js"></script>
  <script>requireAuth();</script>
  <script src="../js/billing-provider.js"></script>
</body>
</html>
