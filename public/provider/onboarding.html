<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <title>plugFeed - plug Onboarding</title>
</head>
<body class="auth-page provider-theme">
  <main class="screen">
    <header class="topbar">
      <a class="brand-link" href="../landing.html" aria-label="PlugFeed home">
        <img src="../assets/plugFeedlogo-rmbg.png" alt="PlugFeed logo" class="brand-logo" />
      </a>
      <p class="kicker">plug Setup</p>
    </header>

    <section class="auth-card auth-simple">
      <h1>Quick business setup</h1>
      <p class="muted">Set up essentials now. Complete the rest from Profile later.</p>
      <p class="kicker" id="provider-step-counter">Step 1 of 3</p>

      <form id="provider-onboarding-form" class="modal-form">
        <div class="onboard-step" data-step="1">
          <label class="input-field">
            <span>Business name</span>
            <input type="text" id="provider-name" placeholder="Your business name" required />
          </label>
          <label class="input-field">
            <span>Category</span>
            <select id="provider-main-category" required>
              <option value="">Select a category</option>
            </select>
          </label>
          <label class="input-field">
            <span>Primary service</span>
            <select id="provider-category" required>
              <option value="">Select a service</option>
            </select>
          </label>
          <label class="input-field">
            <span>Service tags (optional)</span>
            <select id="provider-service-tags" multiple size="5" class="services-select"></select>
            <small class="muted">Optional tags help discovery.</small>
          </label>
        </div>

        <div class="onboard-step hidden" data-step="2">
          <label class="input-field">
            <span>Business location</span>
            <input type="text" id="provider-location" placeholder="City, State" required />
            <small class="muted">Use ZIP or City, ST (e.g., 07030 or Hoboken, NJ).</small>
          </label>
          <label class="input-field">
            <span>Typical project range (optional)</span>
            <input type="text" id="provider-budget" placeholder="e.g. 500-2000" />
          </label>
          <label class="input-field">
            <span>Short bio</span>
            <textarea id="provider-description" rows="4" placeholder="Tell Neighbors what you do." required></textarea>
          </label>
        </div>

        <div class="onboard-step hidden" data-step="3">
          <label class="upload-field">
            <span>Preset banner color (optional)</span>
            <div class="banner-presets" id="provider-onboarding-banner-presets">
              <button type="button" class="color-swatch" data-banner-color="#ef4444" style="--swatch:#ef4444;" aria-label="Red"></button>
              <button type="button" class="color-swatch" data-banner-color="#f97316" style="--swatch:#f97316;" aria-label="Orange"></button>
              <button type="button" class="color-swatch" data-banner-color="#facc15" style="--swatch:#facc15;" aria-label="Yellow"></button>
              <button type="button" class="color-swatch" data-banner-color="#84cc16" style="--swatch:#84cc16;" aria-label="Lime"></button>
              <button type="button" class="color-swatch" data-banner-color="#22c55e" style="--swatch:#22c55e;" aria-label="Green"></button>
              <button type="button" class="color-swatch" data-banner-color="#14b8a6" style="--swatch:#14b8a6;" aria-label="Teal"></button>
              <button type="button" class="color-swatch" data-banner-color="#3b82f6" style="--swatch:#3b82f6;" aria-label="Blue"></button>
              <button type="button" class="color-swatch" data-banner-color="#8b5cf6" style="--swatch:#8b5cf6;" aria-label="Purple"></button>
              <button type="button" class="color-swatch" data-banner-color="#ec4899" style="--swatch:#ec4899;" aria-label="Pink"></button>
              <button type="button" class="color-swatch" data-banner-color="#a16207" style="--swatch:#a16207;" aria-label="Brown"></button>
              <button type="button" class="color-swatch" data-banner-color="#64748b" style="--swatch:#64748b;" aria-label="Slate"></button>
              <button type="button" class="color-swatch" data-banner-color="#111827" style="--swatch:#111827;" aria-label="Black"></button>
            </div>
            <small class="muted">If no banner is uploaded, this color will be used.</small>
          </label>
          <label class="upload-field">
            <span>Business logo</span>
            <input type="file" id="provider-logo-upload" accept="image/*" />
            <small class="muted" id="provider-logo-upload-name">No image chosen</small>
          </label>
          <label class="upload-field">
            <span>Business banner</span>
            <input type="file" id="provider-banner-upload" accept="image/*" />
            <small class="muted" id="provider-banner-upload-name">No image chosen</small>
          </label>
          <label class="upload-field">
            <span>Business photos (up to 3, minimum 2 total uploads)</span>
            <input type="file" id="provider-gallery-upload" accept="image/*" multiple />
            <small class="muted" id="provider-gallery-upload-name">No images chosen</small>
          </label>
        </div>

        <div class="auth-actions">
          <button type="button" class="ghost-button" id="provider-back" hidden>Back</button>
          <button type="button" class="primary-button" id="provider-next">Next</button>
          <button type="button" class="ghost-button" id="provider-skip-media" hidden>Skip for now</button>
          <button type="submit" class="primary-button" id="provider-finish" hidden>Finish</button>
        </div>
      </form>

      <div class="auth-status" id="provider-onboarding-status"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/nav-badges.js"></script>
  <script src="../js/service-tags.js"></script>
  <script src="../js/image-cropper.js"></script>
  <script src="../js/auth-required.js"></script>
  <script>requireAuth();</script>
  <script src="../js/provider-onboarding.js"></script>
</body>
</html>
